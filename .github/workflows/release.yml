name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --config src-tauri/tauri.macos.conf.json"
          - platform: macos-latest # Intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --config src-tauri/tauri.macos.conf.json"
          - platform: ubuntu-22.04
            target: ""
            args: "--config src-tauri/tauri.linux.conf.json"
          - platform: windows-latest
            target: ""
            args: "--config src-tauri/tauri.windows.conf.json"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev \
            build-essential \
            curl wget file

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch PDFium library (unix)
        if: runner.os != 'Windows'
        run: |
          set -e
          case "${{ matrix.platform }}|${{ matrix.target }}" in
            "macos-latest|aarch64-apple-darwin") A=pdfium-mac-arm64; L=lib/libpdfium.dylib; D=libpdfium.dylib ;;
            "macos-latest|x86_64-apple-darwin")  A=pdfium-mac-x64;   L=lib/libpdfium.dylib; D=libpdfium.dylib ;;
            "ubuntu-22.04|")                     A=pdfium-linux-x64; L=lib/libpdfium.so;    D=libpdfium.so ;;
            *) echo "unknown target"; exit 1 ;;
          esac
          curl -sL -o pdfium.tgz "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/$A.tgz"
          tar xzf pdfium.tgz -C . "$L"
          cp "$L" "src-tauri/$D"
          ls -la "src-tauri/$D"

      - name: Fetch PDFium library (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz" -OutFile pdfium.tgz
          tar xzf pdfium.tgz -C . bin/pdfium.dll
          Copy-Item bin/pdfium.dll src-tauri/pdfium.dll
          Get-Item src-tauri/pdfium.dll

      - name: Read release notes
        id: notes
        run: |
          {
            echo 'body<<EOF'
            cat .github/RELEASE_NOTES.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build the app (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'app-build' }}
          releaseName: "PDF Studio ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
